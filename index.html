<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Food Diary v11.2</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- タブ -->
  <div class="tabs">
    <button class="tab-button active" data-tab="input">入力</button>
    <button class="tab-button" data-tab="dashboard">Dashboard</button>
    <button class="tab-button" data-tab="report">Report</button>
    <button class="tab-button" data-tab="guide">Guide</button>
    <button class="tab-button" data-tab="settings">Settings</button>
  </div>

  <!-- 入力 -->
  <div id="tab-input" class="tab-content active">

    <div class="category-box">
      <button class="log-btn" data-category="朝食">朝食</button>
      <button class="log-btn" data-category="昼食">昼食</button>
      <button class="log-btn" data-category="夕食">夕食</button>
      <button class="log-btn" data-category="間食">間食</button>
      <button class="log-btn" data-category="飲料">飲料</button>
      <button class="log-btn" data-category="水">水</button>
      <button class="log-btn" data-category="コーヒー">コーヒー</button>
      <button class="log-btn" data-category="サプリ">サプリ</button>
      <button class="log-btn" data-category="体調">体調</button>
      <button class="log-btn" data-category="運動">運動</button>
      <button class="log-btn" data-category="例外">例外</button>
    </div>

    <div class="input-block">
      <h3>内容</h3>
      <input id="textInput" placeholder="例：水200ml / D3 / 牛丼">
      <div id="suggestBox" class="suggest-box"></div>
      <button id="addLogBtn">追加</button>
    </div>

    <div id="logList" class="log-list"></div>

  </div>

  <!-- Dashboard -->
  <div id="tab-dashboard" class="tab-content">
    <div id="dashboardContent"></div>
  </div>

  <!-- Report -->
  <div id="tab-report" class="tab-content">
    <div id="reportContent"></div>
  </div>

  <!-- Guide -->
  <div id="tab-guide" class="tab-content">
    <div id="guideContent"></div>
  </div>

  <!-- Settings -->
  <div id="tab-settings" class="tab-content">
    <h3>設定</h3>
    <label>水分目標（ml）</label>
    <input id="targetWater" type="number">

    <label>コーヒー上限（杯）</label>
    <input id="coffeeLimit" type="number">

    <button id="resetAppBtn">アプリ初期化</button>
  </div>

  <script src="main.js"></script>

</body>
</html>
