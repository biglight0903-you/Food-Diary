<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>Food Diary v10.1</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <h1>Food Diary v10.1</h1>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" data-tab="dashboard">Dashboard</button>
    <button class="tab-btn" data-tab="log">Log</button>
    <button class="tab-btn" data-tab="report">Report</button>
    <button class="tab-btn" data-tab="guide">Guide</button>
    <button class="tab-btn" data-tab="settings">Settings</button>
  </nav>

  <main class="tab-contents">
    <!-- Dashboard -->
    <section id="dashboard" class="tab-content active">
      <div id="dashboardToday"></div>
      <div id="dashboardTrends"></div>
    </section>

    <!-- Log -->
    <section id="log" class="tab-content">
      <div id="logInputArea"></div>
      <div id="logList"></div>
    </section>

    <!-- Report -->
    <section id="report" class="tab-content">
      <div id="weeklyReport"></div>
      <div id="monthlyReport"></div>
      <div id="yearlyReport"></div>
    </section>

    <!-- Guide -->
    <section id="guide" class="tab-content">
      <div id="guideContent"></div>
    </section>

    <!-- Settings -->
    <section id="settings" class="tab-content">
      <div class="dash-block">
        <div class="dash-title">設定</div>

        <div class="setting-row">
          <label>
            <input type="checkbox" id="notify18" />
            18:00 に「水 200ml」を通知
          </label>
        </div>

        <div class="setting-row">
          <label>
            目標水分量（ml）：
            <input type="number" id="targetWater" min="0" step="100" />
          </label>
        </div>

        <div class="setting-row">
          <button id="backupBtn">バックアップをダウンロード</button>
        </div>

        <div class="setting-row">
          <input type="file" id="restoreFile" />
          <button id="restoreBtn">バックアップから復元</button>
        </div>

      </div>
    </section>
  </main>

  <script src="main.js"></script>
</body>
</html>
