<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Food Diary</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- タブ -->
  <div class="tabs">
    <button class="tab-button active" data-tab="guide">Guide</button>
    <button class="tab-button" data-tab="manage">管理</button>
  </div>

  <!-- Guide -->
  <div id="tab-guide" class="tab-content active">
    <div id="guideContent"></div>
  </div>

  <!-- 管理 -->
  <div id="tab-manage" class="tab-content">

    <!-- 固有名詞ボタン -->
    <div class="card">
      <div class="card-header">固有名詞ボタン</div>
      <div class="button-group">
        <button class="btn" onclick="quickAdd('マルチビタミン')">マルチ</button>
        <button class="btn" onclick="quickAdd('ビタミンD3')">D3</button>
        <button class="btn" onclick="quickAdd('オメガ3')">オメガ3</button>
        <button class="btn" onclick="quickAdd('亜鉛')">亜鉛</button>
        <button class="btn" onclick="quickAdd('マグネシウム')">マグネ</button>
        <button class="btn" onclick="quickAdd('サイリウム')">サイリウム</button>
        <button class="btn" onclick="quickAdd('コーヒー')">コーヒー</button>
      </div>

      <p style="margin-top:10px; font-weight:bold;">水（50ml刻み）</p>
      <div class="button-group">
        <script>
          for (let i=50; i<=500; i+=50) {
            document.write(`<button class="btn" onclick="quickAdd('水${i}ml')">水${i}</button>`);
          }
        </script>
      </div>
    </div>

    <!-- カテゴリ -->
    <div class="card">
      <div class="card-header">カテゴリ（複数選択可）</div>
      <div id="categoryButtons" class="button-group">
        <script>
          const categories = ["朝食","昼食","夕食","間食","食事","飲料","菓子","サプリ","薬","運動","体調","例外処理"];
          categories.forEach(cat => {
            document.write(`<button class="btn" onclick="toggleCategory(this,'${cat}')">${cat}</button>`);
          });
        </script>
      </div>
    </div>

    <!-- 入力 -->
    <div class="card">
      <div class="card-header">内容入力</div>
      <input id="textInput" placeholder="例：コーラ200ml / 牛丼 / 薬A" onfocus="showSuggestions()" oninput="filterSuggestions()">
      <div id="suggestionBox" class="suggestion-box"></div>
      <button class="btn btn-solid" onclick="addLog()">＋ 記録する</button>
    </div>

    <!-- 今日の記録 -->
    <div class="card">
      <div class="card-header">今日の記録</div>
      <ul id="logList"></ul>
      <button class="btn btn-danger" onclick="clearAllLogs()">全削除</button>
    </div>

    <!-- AI解析 -->
    <button class="btn btn-solid" onclick="analyzeLogs()">AI解析する</button>
    <div id="analysisResult"></div>

  </div>

  <script src="main.js"></script>
</body>
</html>
