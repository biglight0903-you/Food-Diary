<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Food Diary v11.0</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css?v=11">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <h1>Food Diary v11.0</h1>
      <nav class="tabs">
        <button class="tab-button active" data-tab="log">Log</button>
        <button class="tab-button" data-tab="dashboard">Dashboard</button>
        <button class="tab-button" data-tab="report">Report</button>
        <button class="tab-button" data-tab="guide">Guide</button>
        <button class="tab-button" data-tab="settings">Settings</button>
      </nav>
    </header>

    <main class="app-main">

      <!-- Log -->
      <section id="tab-log" class="tab-content active">
        <h2>Log</h2>

        <!-- 食べ物系 -->
        <div class="log-section">
          <h3>食べ物系（Food）</h3>

          <div class="button-group">
            <button class="log-btn" data-category="食事">食事</button>
            <button class="log-btn" data-category="朝食">朝食</button>
            <button class="log-btn" data-category="昼食">昼食</button>
            <button class="log-btn" data-category="夕食">夕食</button>
            <button class="log-btn" data-category="間食">間食</button>
            <button class="log-btn" data-category="例外">例外</button>
            <button class="log-btn" data-category="外食">外食</button>
            <button class="log-btn" data-category="夜食">夜食</button>
          </div>

          <div class="log-input-block">
            <label>品名（単品）</label>
            <input type="text" id="foodName" placeholder="例：オイコス バニラ">
            <div class="suggestions" id="foodNameSuggestions"></div>
          </div>

          <div class="log-input-row">
            <div>
              <label>量の単位</label>
              <div class="button-group small">
                <button class="unit-btn" data-target="foodUnit" data-unit="g">g</button>
                <button class="unit-btn" data-target="foodUnit" data-unit="個">個</button>
                <button class="unit-btn" data-target="foodUnit" data-unit="kcal">kcal</button>
                <button class="unit-btn" data-target="foodUnit" data-unit="P">P</button>
              </div>
            </div>
            <div>
              <label>量</label>
              <input type="number" id="foodAmount" placeholder="例：12">
            </div>
          </div>

          <div class="log-input-block">
            <label>まとめ入力（「、」または「,」で区切る）</label>
            <textarea id="foodBulk" rows="2" placeholder="例：卵2個、納豆、味噌汁"></textarea>
          </div>

          <button type="button" id="addFoodLogBtn" class="primary-btn">食べ物ログを追加</button>
        </div>

        <hr>


                <!-- 飲料系 -->
        <div class="log-section">
          <h3>飲料系（Drink）</h3>

          <div class="button-group">
            <button class="log-btn" data-category="飲料">飲料</button>
            <button class="log-btn" data-category="水">水</button>
            <button class="log-btn" data-category="コーヒー">コーヒー</button>
            <button class="log-btn" data-category="お茶">お茶</button>
            <button class="log-btn" data-category="炭酸水">炭酸水</button>
            <button class="log-btn" data-category="酒">酒</button>
          </div>

          <div class="log-input-block">
            <label>品名（単品）</label>
            <input type="text" id="drinkName" placeholder="例：コーラゼロ">
            <div class="suggestions" id="drinkNameSuggestions"></div>
          </div>

          <div class="log-input-row">
            <div>
              <label>量の単位</label>
              <div class="button-group small">
                <button class="unit-btn" data-target="drinkUnit" data-unit="ml">ml</button>
                <button class="unit-btn" data-target="drinkUnit" data-unit="L">L</button>
                <button class="unit-btn" data-target="drinkUnit" data-unit="cc">cc</button>
              </div>
            </div>
            <div>
              <label>量</label>
              <input type="number" id="drinkAmount" placeholder="例：500">
            </div>
          </div>

          <div class="log-input-block">
            <label>まとめ入力（「、」または「,」で区切る）</label>
            <textarea id="drinkBulk" rows="2" placeholder="例：水500ml、コーラゼロ350ml"></textarea>
          </div>

          <!-- ★ 修正済み：ここから addFoodLogBtn を削除 -->
          <button type="button" id="addDrinkLogBtn" class="primary-btn">飲料ログを追加</button>
          <button type="button" id="addMiscLogBtn" class="primary-btn">その他ログを追加</button>
        </div>

        <hr>

        <!-- サプリ・体調・運動 -->
        <div class="log-section">
          <h3>サプリ・体調・運動</h3>

          <div class="button-group">
            <button class="log-btn" data-category="サプリ">サプリ</button>
            <button class="log-btn" data-category="D3">D3</button>
            <button class="log-btn" data-category="マルチビタミン">マルチビタミン</button>
            <button class="log-btn" data-category="オメガ3">オメガ3</button>
            <button class="log-btn" data-category="亜鉛">亜鉛</button>
            <button class="log-btn" data-category="マグネシウム">マグネシウム</button>
            <button class="log-btn" data-category="サイリウム">サイリウム</button>
            <button class="log-btn" data-category="プロテイン">プロテイン</button>
          </div>

          <div class="button-group">
            <button class="log-btn" data-category="体調">体調</button>
            <button class="log-btn" data-category="頭痛">頭痛</button>
            <button class="log-btn" data-category="眠気">眠気</button>
            <button class="log-btn" data-category="だるさ">だるさ</button>
            <button class="log-btn" data-category="集中力低下">集中力低下</button>
          </div>

          <div class="button-group">
            <button class="log-btn" data-category="運動">運動</button>
            <button class="log-btn" data-category="徒歩">徒歩</button>
            <button class="log-btn" data-category="ラン">ラン</button>
            <button class="log-btn" data-category="スクワット">スクワット</button>
            <button class="log-btn" data-category="ストレッチ">ストレッチ</button>
          </div>

          <div class="log-input-block">
            <label>自由入力</label>
            <input type="text" id="miscText" placeholder="例：頭痛 強め、徒歩 20分 など">
            <div class="suggestions" id="miscTextSuggestions"></div>
          </div>

          <button type="button" id="addMiscLogBtn2" class="primary-btn">その他ログを追加</button>

        </div>

        <hr>

        <div class="log-list-wrapper">
          <h3>ログ一覧</h3>
          <div id="logList"></div>
        </div>
      </section>


            <!-- Dashboard -->
      <section id="tab-dashboard" class="tab-content">
        <h2>Dashboard</h2>
        <div id="dashboardDateInfo" class="date-info"></div>
        <div id="dashboardContent"></div>
      </section>

      <!-- Report -->
      <section id="tab-report" class="tab-content">
        <h2>Report</h2>
        <div id="reportDateInfo" class="date-info"></div>
        <div id="reportContent"></div>
      </section>

      <!-- Guide -->
      <section id="tab-guide" class="tab-content">
        <iframe 
          src="guide.html"
          style="
            width:100%;
            height:80vh;
            border:none;
            border-radius:12px;
            background:#fff;
          ">
        </iframe>
      </section>

      <!-- Settings -->
      <section id="tab-settings" class="tab-content">
        <h2>Settings</h2>

        <!-- （設定 UI はそのまま） -->

      </section>

    </main>
  </div>

  <script src="main.js?v=12" defer></script>

</body>
</html>
